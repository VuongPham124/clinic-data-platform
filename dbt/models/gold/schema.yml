version: 2

models:
  - name: gold_clinic_doctor_operational_efficiency_weekly
    columns:
      - name: id
        tests:
          - not_null
          # - unique
      - name: clinic_key
        tests:
          - not_null


      - name: week_start_date_key
        tests:
          - not_null

  - name: gold_clinic_visits_doctor_monthly
    columns:
      - name: id
        tests:
          - not_null
          # - unique

      - name: clinic_key
        tests:
          - not_null

      - name: month_start_date_key
        tests:
          - not_null

  - name: gold_clinic_patient_visits_monthly
    columns:
      - name: id
        tests:
          - not_null
          # - unique

      - name: clinic_key
        tests:
          - not_null

      - name: month_start_date_key
        tests:
          - not_null

  - name: gold_prescription_value_daily
    columns:
      - name: clinic_key
        tests: [not_null]
      - name: doctor_key
        tests: [not_null]
      - name: date_key
        tests: [not_null]

  - name: gold_disease_top_by_clinic_age_weekly
    columns:
      - name: clinic_key
        tests: [not_null]
      - name: week_start_date_key
        tests: [not_null]
      - name: age_group_key
        tests: [not_null]
      - name: disease_code
        tests: [not_null]
  - name: gold_near_expiry_drugs
    columns:
      - name: clinic_key
        tests: [not_null]

      - name: medicine_key
        tests: [not_null]

      - name: lot_key
        tests: [not_null]

      - name: medicine_import_detail_id
        tests: [not_null, unique]

      - name: expire_date
        tests: [not_null]

      - name: current_quantity
        tests: [not_null]

      - name: days_to_expire
        tests: [not_null]

      - name: urgent_level
        tests:
          - not_null
          - accepted_values:
              values: ['red', 'yellow', 'green']
  - name: gold_best_selling_items
    columns:
      - name: clinic_key
        tests: [not_null]

      - name: medicine_key
        tests: [not_null]

      - name: year
        tests: [not_null]

      - name: month
        tests: [not_null]

      - name: total_quantity_exported
        tests: [not_null]

      - name: rank
        tests: [not_null]


  - name: gold_low_stock_items
    columns:
      - name: clinic_key
        tests: [not_null]

      - name: medicine_key
        tests: [not_null]

      - name: lot_key
        tests: [not_null]

      - name: current_quantity
        tests: [not_null]

      - name: items_sold_prev_month
        tests: [not_null]

      - name: is_low_stock
        tests: [not_null]
