version: 2

models:
  # =========================
  # DIMENSIONS
  # =========================

  - name: dim_clinics
    columns:
      - name: clinic_key
        tests:
          - not_null
          - unique

  - name: dim_clinic_doctors
    columns:
      - name: doctor_key
        tests:
          - not_null
          - unique

  - name: dim_clinic_patients
    columns:
      - name: patient_key
        tests:
          - not_null
          - unique

  - name: dim_clinic_rooms
    columns:
      - name: doctor_key
        tests:
          - not_null
      - name: clinic_key
        tests:
          - not_null
    
  - name: dim_date
    columns:
      - name: date_key
        tests:
          - not_null
          - unique

  - name: dim_medicines
    columns:
      - name: medicine_key
        tests:
          - not_null
          - unique
  - name: dim_medicines_lot
    columns:
      - name: lot_key
        tests:
          - not_null
          - unique

  # =========================
  # FACT
  # =========================

  - name: fact_operational_clinic_bookings
    columns:
      - name: booking_id
        tests:
          - not_null:
              config:
                severity: warn
          - unique:
              config:
                severity: warn

      - name: clinic_key
        tests:
          - not_null:
              config:
                severity: warn

      - name: patient_key
        tests:
          - not_null:
              config:
                severity: warn

      - name: from_date_key
        tests:
          - not_null:
              config:
                severity: warn
